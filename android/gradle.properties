# ============================================================
# android/gradle.properties
# ============================================================

# AndroidX — required by all modern Flutter plugins
android.useAndroidX=true
android.enableJetifier=true

# ✅ Opt OUT of new DSL to avoid AGP 9 breakage
# This is what Flutter's own fix guide recommends
android.newDsl=false

# Increase heap for Agora + Firebase builds
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Speed up builds
org.gradle.parallel=true
org.gradle.caching=true

# Kotlin style
kotlin.code.style=official