name: open_cast
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  
  # State management & Routing
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  provider: ^6.1.2 # Temporarily keeping provider during migration
  
  # Video / Streaming Core
  flutter_webrtc: ^0.11.7 # Added for target WebRTC core
  agora_rtc_engine: ^6.3.2 # Temporarily keeping for compat
  
  # UI & Animations
  flutter_animate: ^4.5.0
  fl_chart: ^0.66.2
  glassmorphism: ^3.0.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  responsive_framework: ^1.3.0
  font_awesome_flutter: ^10.7.0
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.0
  
  # Local Storage & Helpers
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  intl: ^0.19.0
  http: ^1.2.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
